name: Update Visual Baselines

# Manually triggered from the Actions tab.
# GitHub asks "Run workflow on branch:" — pick the branch you want baselines
# committed to (default: main). The bot commits directly to that branch.
#
# ⚠️ Branch protection note:
#   This workflow pushes directly (not via PR). If you later enable
#   "Require a pull request before merging" on main, run this workflow
#   on a feature branch instead and open a PR to land the baseline update.
#   Current protection (M0) only requires status checks on PRs, so direct
#   push to main by github-actions[bot] is permitted.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-baselines:
    name: Regenerate Visual Baselines (Linux)
    runs-on: ubuntu-latest
    # Same pinned image used by build-check.yml visual-advisory job —
    # guarantees identical font rendering, so CI comparisons won't flake.
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Write token so the commit-back step can push
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site (visual tests need a served dist/)
        run: npm run build

      - name: Regenerate visual baselines
        run: npm run test:visual:update

      - name: Commit and push baselines (only when changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/e2e/__snapshots__/
          if git diff --staged --quiet; then
            echo "Baselines unchanged — nothing to commit."
          else
            git commit -m "test(visual): regenerate Linux baselines [skip ci]"
            git push
          fi
