name: Update Visual Baselines

# Manually triggered from the Actions tab.
#
# USAGE:
#   1. Go to Actions → "Update Visual Baselines" → Run workflow
#   2. Leave "branch" as `main` to update main after a merged change, OR
#      enter a PR branch (e.g. `squad/issue-26-m4-polish`) to bless
#      intentional UI changes on that PR before review.
#   3. Click "Run workflow".
#
# WHAT HAPPENS:
#   - For a PR branch (non-main): baselines are committed DIRECTLY to that
#     branch. The now-blocking visual check re-runs automatically and goes
#     green once the commit lands.
#   - For main: baselines are committed to a `baselines/auto-<run-id>` branch
#     and a PR is opened with auto-merge enabled (branch protection prevents a
#     direct push to main). Earl can also merge it manually with:
#       gh pr merge baselines/auto-<run-id> --admin --squash
#
# ⚠️ The container (mcr.microsoft.com/playwright:v1.61.1-noble) is the same
#    pinned image as CI — guarantees identical font rendering so comparison
#    won't flake due to rendering differences.

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Target branch for baseline regeneration (default: main). Enter a PR branch name to bless UI changes on that PR.'
        required: false
        default: 'main'

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── Job 1: Run tests inside the Playwright container ──────────────────────
  generate-baselines:
    name: Regenerate Visual Baselines (Linux)
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site (visual tests need a served dist/)
        run: npm run build

      - name: Regenerate visual baselines
        run: npm run test:visual:update

      - name: Upload snapshot artifacts
        uses: actions/upload-artifact@v4
        with:
          name: visual-snapshots
          path: tests/e2e/__snapshots__/
          if-no-files-found: warn

  # ── Job 2: Commit baselines on a plain runner (gh CLI available) ───────────
  commit-baselines:
    name: Commit baselines to branch
    needs: generate-baselines
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download snapshot artifacts
        uses: actions/download-artifact@v4
        with:
          name: visual-snapshots
          path: tests/e2e/__snapshots__/

      - name: Commit and push baselines
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_BRANCH: ${{ github.event.inputs.branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/e2e/__snapshots__/
          if git diff --staged --quiet; then
            echo "Baselines unchanged — nothing to commit."
            exit 0
          fi

          if [ "$TARGET_BRANCH" = "main" ]; then
            # For main: branch protection blocks direct push.
            # Create a baselines/* branch, open PR, enable auto-merge.
            BASELINE_BRANCH="baselines/auto-${GITHUB_RUN_ID}"
            git checkout -b "$BASELINE_BRANCH"
            git commit -m "test(visual): regenerate Linux baselines [skip ci]"
            git push origin "$BASELINE_BRANCH"
            gh pr create \
              --title "test(visual): regenerate Linux baselines" \
              --body "Automated baseline update from workflow run \`${GITHUB_RUN_ID}\`. Auto-merges once CI passes. To merge manually: \`gh pr merge ${BASELINE_BRANCH} --admin --squash\`" \
              --base main \
              --head "$BASELINE_BRANCH"
            gh pr merge "$BASELINE_BRANCH" --auto --squash
            echo "PR opened and auto-merge enabled — lands once CI passes."
          else
            # For any PR branch: push directly. Branch protection only guards main.
            # NOTE: Do NOT add [skip ci] here — these commits land in the PR branch
            # and get squashed into the merge commit. [skip ci] in any squash-commit
            # body causes GitHub to skip ALL workflows on the main push, including
            # deploy.yml. Root-cause of M4 missed auto-deploy (2026-07-23).
            git commit -m "test(visual): regenerate Linux baselines for ${TARGET_BRANCH}"
            git push origin HEAD:"$TARGET_BRANCH"
            echo "Baselines committed directly to ${TARGET_BRANCH}."
          fi

